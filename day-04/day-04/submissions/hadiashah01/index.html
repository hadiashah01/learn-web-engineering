<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Box Model & Display Property</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <p class="box box--small">
        <span>Span 1</span>
        <span>Span 2</span>
        <span>Span 3</span></p>
    <p class="box box--medium">
        <span>Span 1</span>
        <span>Span 2</span>
        <span>Span 3</span></p>
    <p class="box box--large">
        <span>Span 1</span>
        <span>Span 2</span>
        <span>Span 3</span></p>
    <p class="box box--extra-large">
        <span>Span 1</span>
        <span>Span 2</span>
        <span>Span 3</span></p>
  </body>
</html>
